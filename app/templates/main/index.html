{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<h1>Dashboard</h1>

<div class="stats">
    <div class="stat">
        <h3>Inventory Value</h3>
        <p id="inventory-value">Loading...</p>
    </div>
    <div class="stat">
        <h3>Low Stock Alerts</h3>
        <p id="alert-count">Loading...</p>
    </div>
</div>

<h2>Low Stock Alerts</h2>
<div id="alerts-list"></div>

<h2>Quick Actions</h2>
<ul>
    <li><a href="/api/products">View Products</a></li>
    <li><a href="/api/suppliers">View Suppliers</a></li>
    <li><a href="/api/reports/turnover">Inventory Turnover</a></li>
    <li><a href="/api/reports/top-products">Top Moving Products</a></li>
</ul>

<script>
fetch('/api/inventory-value')
    .then(r => r.json())
    .then(data => {
        document.getElementById('inventory-value').textContent = data.total_gel + ' GEL';
    });

fetch('/api/alerts')
    .then(r => r.json())
    .then(data => {
        document.getElementById('alert-count').textContent = data.length + ' products';
        const list = document.getElementById('alerts-list');
        if (data.length === 0) {
            list.innerHTML = '<p>No low stock alerts.</p>';
        } else {
            list.innerHTML = data.map(p =>
                `<div class="alert-item">${p.name} (${p.sku}): ${p.current_stock} / ${p.min_stock}</div>`
            ).join('');
        }
    });
</script>
{% endblock %}
